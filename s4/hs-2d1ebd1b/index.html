<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
<meta name="googlebot" content="noindex,nofollow" />
<title>Restricted</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=Azeret+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: oklch(9% 0.008 97);
    --bg-2: oklch(11.5% 0.006 97);
    --ink: oklch(96% 0.003 97);
    --ink-dim: oklch(64% 0.005 97);
    --line: oklch(19% 0.007 97);
    --accent: oklch(86% 0.175 97);
    --accent-2: oklch(56% 0.215 28);
    --mono: 'Azeret Mono', ui-monospace, monospace;
    --body: 'Archivo', system-ui, sans-serif;
    --display: 'Anton', 'Archivo', sans-serif;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 85% -10%, oklch(86% 0.175 97 / 0.10), transparent 40%),
      radial-gradient(circle at 0% 110%, oklch(56% 0.215 28 / 0.08), transparent 45%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: linear-gradient(90deg, transparent 0, transparent 49.5%, oklch(96% 0.003 97 / 0.025) 50%, transparent 50.5%, transparent 100%);
    background-size: 80px 100%;
    pointer-events: none;
    z-index: 0;
    animation: lines 14s linear infinite;
  }
  @keyframes lines { from { background-position: 0 0; } to { background-position: -320px 0; } }

  .vault {
    position: relative;
    z-index: 1;
    width: min(420px, 92vw);
    border: 1px solid var(--line);
    background: var(--bg-2);
    padding: 38px 36px 32px;
  }
  .vault::before {
    content: "RESTRICTED";
    position: absolute;
    top: -10px;
    left: 22px;
    background: var(--bg);
    color: var(--accent-2);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    padding: 0 10px;
    font-weight: 700;
  }
  .stamp {
    position: absolute;
    top: -18px;
    right: -14px;
    padding: 4px 10px;
    border: 2px solid var(--accent-2);
    color: var(--accent-2);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.28em;
    font-weight: 700;
    transform: rotate(8deg);
    background: oklch(56% 0.215 28 / 0.06);
    text-transform: uppercase;
    z-index: 2;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: 48px;
    line-height: 0.9;
    letter-spacing: 0.01em;
    margin: 0 0 6px;
    text-transform: uppercase;
  }
  h1 .accent { color: var(--accent); }
  .sub {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  form { display: grid; gap: 12px; }
  label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  input[type=password] {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=password]:focus { border-color: var(--accent); }
  button {
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    font-weight: 700;
    padding: 13px 14px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: var(--accent); }
  button:disabled { background: var(--ink-dim); cursor: progress; }
  .err {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    color: var(--accent-2);
    text-transform: uppercase;
    min-height: 14px;
    margin-top: 4px;
  }
  .foot {
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    color: oklch(40% 0.005 97);
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="vault">
    <div class="stamp">Eyes Only</div>
    <div class="eyebrow">Heavy Sandbags · S4</div>
    <h1>Strategy <span class="accent">Vault.</span></h1>
    <div class="sub">Authorized personnel only</div>
    <form id="f" autocomplete="off">
      <label for="p">Passphrase</label>
      <input id="p" type="password" autocomplete="off" autofocus required />
      <button id="b" type="submit">Unlock</button>
      <div class="err" id="e">&nbsp;</div>
    </form>
    <div class="foot">Chief Sandbagger × Speedy Sully</div>
  </div>

<script>
(function(){
  const ITER = 250000;
  const blob64 = document.getElementById('ct').textContent.trim();
  const f = document.getElementById('f');
  const p = document.getElementById('p');
  const b = document.getElementById('b');
  const err = document.getElementById('e');

  function b64ToBytes(s){
    const bin = atob(s);
    const out = new Uint8Array(bin.length);
    for (let i=0; i<bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function unlock(pwd){
    const blob = b64ToBytes(blob64);
    const salt = blob.slice(0, 16);
    const iv = blob.slice(16, 28);
    const tag = blob.slice(28, 44);
    const ct = blob.slice(44);
    const ctWithTag = new Uint8Array(ct.length + tag.length);
    ctWithTag.set(ct, 0);
    ctWithTag.set(tag, ct.length);

    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(pwd), { name: 'PBKDF2' }, false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: ITER, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const ptBuf = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      ctWithTag
    );
    return new TextDecoder().decode(ptBuf);
  }

  f.addEventListener('submit', async function(ev){
    ev.preventDefault();
    err.textContent = ' ';
    b.disabled = true;
    b.textContent = 'Decrypting…';
    try {
      const html = await unlock(p.value);
      // Replace document with decrypted page; document.write re-parses and runs scripts.
      document.open();
      document.write(html);
      document.close();
    } catch(_){
      err.textContent = 'Wrong passphrase';
      b.disabled = false;
      b.textContent = 'Unlock';
      p.select();
    }
  });
})();
</script>
